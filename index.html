<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>프로젝트삼 : 사이</title>

<style>

@font-face {
    font-family: 'Yidstreet';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2110@1.0/YdestreetL.woff2') format('woff2');
    font-weight: 300;
    font-display: swap;
}

@font-face {
    font-family: 'Yidstreet';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2110@1.0/YdestreetB.woff2') format('woff2');
    font-weight: 700;
    font-display: swap;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #ffffff;
    color: #111111;
    font-family: sans-serif;
}

.hero {
    width: 100%;
    height: 100vh;
    padding: 0 24px;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    text-align: center;
}

.title {
    display: flex;
    align-items: center;
    justify-content: center;

    gap: 0.05em;

    font-family: 'Yidstreet', sans-serif;
    font-size: clamp(60px, 10vw, 170px);
    font-weight: 700;

    letter-spacing: -0.04em;
    line-height: 1;
    white-space: nowrap;
}

.logo {
    width: 1em;
    height: 1em;

    border-radius: 50%;
    object-fit: contain;
}

.subtitle {
    margin-top: 40px;
    font-size: clamp(14px, 1.5vw, 22px);
    color: #888;
    letter-spacing: -0.03em;
}

.archive {
    width: 90%;
    max-width: 1000px;
    margin: 0 auto;
    padding: 150px 0;
}

.project {
    padding: 80px 0;
    border-top: 1px solid #ddd;
}

.number {
    font-size: 36px;

    font-weight: 700;

    color: #111;

    margin-bottom: 40px;
}

.project-title {
    font-family: 'Yidstreet', sans-serif;
    font-size: clamp(32px, 5vw, 70px);
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.03em;
}

.project-content {

    display: flex;
    align-items: center;
    justify-content: space-between;

    gap: 80px;

}


.project-image {

    width: 160px;
    height: auto;

    object-fit: contain;

}


.project-text {

    flex: 1;

}

.info {
    margin-top: 30px;
    font-size: 16px;
    color: #555;
    line-height: 1.8;
}

@media (max-width: 600px) {

    .title {
        font-size: 10.5vw;
        letter-spacing: -0.04em;
	gap: 0.18em;
    }

	.logo {
	width: 0.8em;
	height: 0.8em;
   }
}

    .subtitle {
        margin-top: 30px;
    }

    .archive {
        padding: 80px 0;
    }

.project-content {

    flex-direction: column;
    align-items: flex-start;

    gap: 40px;

}


.project-image {

    width: 180px;
    height: auto;

}

}

</style>

</head>

<body>

<section class="hero">

<div class="title">

    <img src="images/logo.png" class="logo">

    <span>
        프로젝트삼 : 사이
    </span>

</div>

    <div class="subtitle">
        보여진 것과 남겨진 것 사이
    </div>

</section>

<section class="archive">

    <div class="project">

       <div class="project">


    <div class="number">
        001
    </div>


    <div class="project-content">

<img class="project-image" src="images/dalsu_thumb.jpg">

        <div class="project-text">


            <div class="info">

                2026.06<br>
                선돌극장<br><br>

                관객이 공연을 만나기 전,<br>
                그리고 떠난 이후의 기록

            </div>


        </div>


    </div>


</div>

    </div>

</section>

</body>

</html>
