<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>프로젝트삼 : 사이</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700&display=swap" rel="stylesheet">


<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #ffffff;
    color: #111111;

    font-family: 'Noto Serif KR', serif;
}


/* 첫 화면 */

.hero {

    width: 100%;
    height: 100vh;

    display: flex;
    flex-direction: column;

    justify-content: center;
    align-items: center;

    text-align: center;
}


/* 프로젝트삼 : 사이 */

.title {

    font-size: clamp(60px, 10vw, 170px);

    font-weight: 700;

    letter-spacing: -0.08em;

    line-height: 1;

}


/* 설명 */

.subtitle {

    margin-top: 40px;

    font-size: clamp(14px, 1.5vw, 22px);

    color: #888;

    letter-spacing: -0.03em;

}



/* 작업 목록 영역 */

.archive {

    width: 90%;
    max-width: 1000px;

    margin: 0 auto;

    padding: 150px 0;

}


.project {

    padding: 80px 0;

    border-top: 1px solid #ddd;

}


.number {

    font-size: 14px;

    color: #777;

    margin-bottom: 40px;

}


.project-title {

    font-size: clamp(32px, 5vw, 70px);

    line-height: 1.2;

    letter-spacing: -0.06em;

}


.info {

    margin-top: 30px;

    font-size: 16px;

    color: #555;

    line-height: 1.8;

}



/* 모바일 */

@media (max-width: 600px) {


.title {

    font-size: clamp(48px, 15vw, 90px);

}


.subtitle {

    margin-top: 30px;

}


.archive {

    padding: 80px 0;

}


}


</style>

</head>



<body>


<section class="hero">


    <div class="title">

        프로젝트삼 : 사이

    </div>


    <div class="subtitle">

        보여진 것과 남겨진 것 사이

    </div>


</section>



<section class="archive">


    <div class="project">


        <div class="number">

            001

        </div>


        <div class="project-title">

            달수랑<br>
            정직이랑<br>
            바다아이

        </div>


        <div class="info">

            2026.06<br>
            작업 기록

        </div>


    </div>


</section>


</body>

</html>
