<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>달수랑 정직이랑 바다아이</title>


<style>

body {

    margin: 0;

    background: #ffffff;

    color: #111;

    font-family: sans-serif;

}


/* 첫 화면 */

.hero {

    height: 100vh;

    display: flex;

    flex-direction: column;

    justify-content: center;

    padding: 0 10%;

}


.number {

    font-size: 28px;

    font-weight: 700;

    margin-bottom: 60px;

}


.title {

    font-size: clamp(48px, 8vw, 120px);

    font-weight: 700;

    line-height: 1.15;

    letter-spacing: -0.07em;

}


.info {

    margin-top: 50px;

    color: #777;

    line-height: 1.8;

}


/* 내용 */

.content {

    padding: 100px 10%;

    max-width: 900px;

}


.section {

    margin-bottom: 150px;

}


.section h2 {

    font-size: 40px;

}


.section p {

    line-height: 2;

    color: #444;

}


</style>

</head>


<body>


<section class="hero">


<div class="number">

001

</div>


<div class="title">

달수랑<br>
정직이랑<br>
바다아이

</div>


<div class="info">

2026.06<br>
선돌극장<br><br>

작업 기록

</div>


</section>



<section class="content">


<div class="section">

<h2>시작</h2>


<p>

처음부터 거대한 계획은 아니었다.<br><br>

작은 제안과 호기심에서 시작된 작업은<br>
공연을 둘러싼 여러 시간들을 건드리기 시작했다.

</p>


</div>


</section>


</body>

</html>
